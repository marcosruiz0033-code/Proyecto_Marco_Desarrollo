<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: base(~{::contenido})}">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <main th:fragment="contenido" class="container my-5">
        <div class="row">

            <!-- ================= FILTROS ================= -->
            <div class="col-md-3 mb-4">

                <div class="card shadow-sm">

                    <div class="card-header">
                        <h5 class="mb-0">Filtros</h5>
                    </div>

                    <div class="card-body">

                        <h6>Categorías</h6>

                        <!-- CATEGORÍAS DINÁMICAS -->
                        <div th:each="c : ${categorias}" class="form-check">

                            <input class="form-check-input"
                                   type="checkbox"
                                   th:value="${c.idCategoria}"
                                   name="categorias">

                            <label class="form-check-label"
                                   th:text="${c.nombre}">
                            </label>

                        </div>

                        <hr>

                        <h6>Precio</h6>

                        <input type="range" class="form-range">

                    </div>

                </div>

            </div>

            <!-- ================= PRODUCTOS ================= -->
            <div class="col-md-9">

                <!-- BUSCADOR Y ORDEN -->
                <form th:action="@{/productos}" method="get">

                    <div class="row mb-4">

                        <div class="col-md-8">
                            <input type="text"
                                   name="buscar"
                                   class="form-control"
                                   placeholder="🔍 Buscar productos...">
                        </div>

                        <div class="col-md-4">

                            <select class="form-select" name="orden">

                                <option value="">Ordenar por</option>

                                <option value="menor">Menor precio</option>
                                <option value="mayor">Mayor precio</option>
                                <option value="vendidos">Más vendidos</option>
                                <option value="recientes">Más recientes</option>

                            </select>

                        </div>

                    </div>

                </form>

                <!-- PRODUCTOS DINÁMICOS -->
                <div class="row">

                    <div class="col-md-4 mb-4"
                         th:each="p : ${productos}">

                        <div class="card h-100 shadow-sm">

                            <!-- IMAGEN -->
                            <img th:src="@{/img/default.jpg}"
                                 class="card-img-top"
                                 alt="Producto">

                            <div class="card-body">

                                <h5 class="card-title"
                                    th:text="${p.nombre}">
                                </h5>

                                <p class="card-text"
                                   th:text="${p.categoria.nombre}">
                                </p>

                                <h4 th:text="'S/ ' + ${p.precio}"></h4>

                                <button class="btn btn-primary w-100">
                                    Agregar al carrito
                                </button>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>
    </main>

</body>
</html>
