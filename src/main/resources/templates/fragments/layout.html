<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:fragment="base(contenido)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link th:href="@{/css/estiloprincipal.css}" rel="stylesheet">
    <title>PC Store</title>
</head>

<body>
<header class= "main-header">
    <div class="logo-container">
        <img class="header-logo" th:src="@{/img/LOGO png.png}" alt="logo de pagina">
        <div class="store-name">
            <h4>PC Store</h4>
        </div>
    </div>
    <div>
        <nav class="main-nav">
            <a th:href="@{/user/}"><i class="nav-icon bi bi-house me-2"></i> Home</a>
            <a th:href="@{/user/nosotros}"><i class="nav-icon bi bi-people me-2"></i> Nosotros</a>
            <a th:href="@{/user/productos}"><i class="nav-icon bi bi-cart3"></i> Productos</a>
            <a href=""><i class="nav-icon bi bi-tools me-2"></i> Servicio tecnico</a>
        </nav>
    </div>
    <div>
        <button class="cart-pill">
            <i class="bi bi-cart3"></i>
        </button>
        <button class="btn-outline">
            <i class="bi bi-person"></i>
        </button>
    </div>
</header>

<!--contenido-->
<main class="contenido-dinamico">
    <div th:replace="${contenido}">

    </div>
</main>


<footer class="bg-dark text-white py-4 mt-5">
    <div class="container">

        <div class="row">

            <!-- Información -->
            <div class="col-md-6 mb-3">
                <h5>PC Store</h5>
                <p>
                    Calidad, confianza y los mejores precios para potenciar tu tecnología.
                </p>
            </div>

            <!-- Contacto -->
            <div class="col-md-3 mb-3">
                <h5>Contacto</h5>
                <p class="mb-1">📱 +51 999 999 999</p>
                <p class="mb-1">✉ ventas@pcstore.com</p>
            </div>

            <!-- Redes Sociales -->
            <div class="col-md-3 mb-3">
                <h5>Síguenos</h5>

                <a href=""><i class="bi bi-facebook"></i> Facebook</a><br>
                <a href=""><i class="bi bi-instagram"></i> Instagram</a><br>
                <a href=""><i class="bi bi-tiktok"></i> TikTok</a><br>
            </div>
        </div>
        <hr>

        <div class="text-center">
            <small>
                © 2026 PC Store. Todos los derechos reservados.
            </small>
        </div>

    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
